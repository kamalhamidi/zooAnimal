name: sound_zoo
description: "SoundZoo - A multi-mode animal sound game for iOS"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0-0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  just_audio: ^0.9.36
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  shared_preferences: ^2.2.3
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  cached_network_image: ^3.3.1
  flutter_tts: ^4.0.2
  google_fonts: ^6.2.1
  confetti: ^0.7.0
  shimmer: ^3.0.0
  audioplayers: ^6.0.0
  google_mobile_ads: ^5.3.0
  record: ^6.2.0
  path_provider: ^2.1.5
  image_picker: ^1.1.2
  connectivity_plus: ^6.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
    - assets/images/
    - assets/lottie/

flutter_launcher_icons:
  ios: true
  image_path: assets/images/app_icon.png
  remove_alpha_ios: true
